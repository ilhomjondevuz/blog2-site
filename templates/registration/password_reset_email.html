<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Parolni tiklash</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f8fa;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
        }
        .btn {
            display: inline-block;
            background-color: #007bff;
            color: #fff !important;
            padding: 12px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Salom, {{ user.get_username }}!</h2>
        <p>Siz parolni tiklashni so‘radingiz. Quyidagi tugmani bosib yangi parol o‘rnatishingiz mumkin:</p>

        <p style="text-align:center;">
            <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" class="btn">
                Parolni tiklash
            </a>
        </p>

        <p>Agar siz bu so‘rovni qilmagan bo‘lsangiz, hech qanday amal qilishingiz shart emas.</p>

        <div class="footer">
            <p>Rahmat, <br> Bizning sayt jamoasi</p>
        </div>
    </div>
</body>
</html>
